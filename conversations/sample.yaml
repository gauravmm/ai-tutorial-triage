# This is a sample conversation. This file would be named with the conversation ID.
id: sample # Same as the filename
history: # In chronological order
  - $$HUMAN$$ The human turn of the conversation.
  - $$BOT$$ The robot turn of the conversation.
last: HUMAN # Who spoke last, HUMAN | BOT
scheduled: # Optional, only present if appointment something is scheduled.
  date: 2026-02-28 # Date in YYYY-mm-dd
  time: am # Time in am | pm
escalated: True # Optional, only present (and True) if conversation is escalated.
